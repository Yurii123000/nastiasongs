<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Песни Насти Луневой</title>

<style>
body {
  margin:0;
  font-family:'Georgia', serif;
  background:#000 url("background.jpg") center/cover fixed no-repeat;
  color:#fff;
}

/* Фиксированная шапка */
header {
  position:fixed;
  top:0;
  left:0;
  width:100%;
  background:rgba(0,0,0,0.75);
  backdrop-filter:blur(6px);
  padding:12px 18px;
  z-index:1000;
  box-sizing:border-box;
}

.header-top {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}

h1 {
  margin:0;
  font-size:24px;
  color:#ff99cc;
  font-style:italic;
}

#nowPlaying {
  margin-top:4px;
  color:#4cc9f0;
  font-size:13px;
  font-style:italic;
}

/* Компактный поиск */
#searchBox {
  width:220px;
  padding:6px 8px;
  border-radius:6px;
  border:none;
  font-size:14px;
  box-sizing:border-box;
}

/* Плеер */
#playerBar {
  margin-top:10px;
  background:rgba(20,20,20,0.8);
  padding:10px;
  border-radius:8px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

audio { width:100%; }

.controls {
  margin-top:10px;
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  justify-content:center;
}

button {
  padding:7px 12px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}

.btn { background:#4cc9f0; color:#000; }
.btn-pink { background:#ff99cc; color:#000; }

/* Контент */
main {
  margin-top:320px;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

ul {
  list-style:none;
  padding:0;
}

li {
  background:rgba(0,0,0,0.45);
  padding:10px;
  margin-bottom:8px;
  border-radius:6px;
}

li.active {
  background:#333;
}

.row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  flex-wrap:wrap;
}

.stats {
  font-size:12px;
  color:#4cc9f0;
  margin-top:5px;
}

/* Донат */
#donate {
  background:rgba(17,17,17,0.85);
  padding:20px;
  border-radius:10px;
  margin-top:25px;
  text-align:center;
}

#donate img {
  border-radius:10px;
  display:block;
  margin:0 auto 15px auto;
}

.donate-btn {
  display:inline-block;
  padding:12px 20px;
  background:#4cc9f0;
  color:#000;
  font-weight:bold;
  border-radius:8px;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
  <div class="header-top">
    <div>
      <h1>Настя Лунева</h1>
      <div id="nowPlaying">Сейчас играет: —</div>
    </div>
    <input type="text" id="searchBox" placeholder="Поиск песни...">
  </div>

  <div id="playerBar">
    <audio id="audio" controls></audio>

    <div class="controls">
      <button class="btn" id="prevBtn">⏮ Prev</button>
      <button class="btn" id="nextBtn">⏭ Next</button>
      <button class="btn-pink" id="shuffleBtn">🔀 Shuffle</button>
      <button class="btn-pink" id="repeatBtn">🔁 Repeat</button>
      <button class="btn" id="downloadCurrentBtn">⬇️ Скачать</button>
    </div>
  </div>
</header>

<main>
  <ul id="trackList"></ul>

  <!-- ДОНАТ БЛОК -->
  <section id="donate">
    <h2 style="color:#ff99cc; font-style:italic; margin-bottom:10px;">
      Потдержать творчество Насти  Луневой
    </h2>

    <p style="color:#4cc9f0; margin-bottom:10px;">
      Откройте камеру на телефоне и наведите  на QR‑код
    </p>

    <img src="images/privat24-qr.png" width="240" height="240" alt="QR Privat24">

    <a href="https://send.monobank.ua/XXXXXXXX"
       target="_blank"
       class="donate-btn">
       💖 Донат онлайн
    </a>
  </section>
</main>

<script>

  "Так хочется покоя и любви.mp3",
  "У истока истинной любви.mp3",
  "Я так скучаю по тебе.mp3",
  "До встречи.mp3",
  "Зимой весь мир.mp3",
  "Как же вышло.mp3",
  "Когда под снегом.mp3",
  "Когда придет весна.mp3",
  "Лето мое.mp3",
  "Лето.mp3",
  "Небо вода и земля.mp3",
  "Подруга осени.mp3",
  "Слон.mp3"
];

/* === ПЕРЕМЕННЫЕ === */
let currentIndex = 0;
let isShuffle = false;
let repeatMode = 0; // 0 = off, 1 = one, 2 = all

const audio = document.getElementById("audio");
const trackList = document.getElementById("trackList");
const nowPlaying = document.getElementById("nowPlaying");
const searchBox = document.getElementById("searchBox");
const downloadCurrentBtn = document.getElementById("downloadCurrentBtn");

const safeSrc = (name) => "music/" + encodeURIComponent(name);

/* === ЛОКАЛЬНАЯ СТАТИСТИКА === */
function initStats() {
  const stats = JSON.parse(localStorage.getItem("stats")) || {};
  tracks.forEach(t => { if (!stats[t]) stats[t] = { plays:0, downloads:0 }; });
  localStorage.setItem("stats", JSON.stringify(stats));
}
const getStats = () => JSON.parse(localStorage.getItem("stats")) || {};
const setStats = (s) => localStorage.setItem("stats", JSON.stringify(s));

/* === СКАЧИВАНИЕ === */
function downloadFile(title) {
  const s = getStats();
  s[title].downloads++;
  setStats(s);

  const a = document.createElement("a");
  a.href = safeSrc(title);
  a.download = title;
  document.body.appendChild(a);
  a.click();
  a.remove();

  renderTrackList(searchBox.value);
}

/* === ОТОБРАЖЕНИЕ СПИСКА === */
function renderTrackList(filter="") {
  const stats = getStats();
  trackList.innerHTML = "";

  tracks
    .filter(t => t.toLowerCase().includes(filter.toLowerCase()))
    .forEach((title) => {
      const realIndex = tracks.indexOf(title);

      const li = document.createElement("li");
      if (realIndex === currentIndex) li.classList.add("active");

      const row = document.createElement("div");
      row.className = "row";

      const nameSpan = document.createElement("span");
      nameSpan.textContent = title.replace(".mp3","");

      const playBtn = document.createElement("button");
      playBtn.textContent = "▶️";
      playBtn.className = "btn";
      playBtn.onclick = () => loadTrack(realIndex, true);

      const dlBtn = document.createElement("button");
      dlBtn.textContent = "⬇️";
      dlBtn.className = "btn";
      dlBtn.onclick = () => downloadFile(title);

      row.appendChild(nameSpan);
      row.appendChild(playBtn);
      row.appendChild(dlBtn);

      const statsDiv = document.createElement("div");
      statsDiv.className = "stats";
      statsDiv.textContent = `🎧 ${stats[title].plays} | ⬇️ ${stats[title].downloads}`;

      li.appendChild(row);
      li.appendChild(statsDiv);
      trackList.appendChild(li);

      if (realIndex === currentIndex) {
        setTimeout(() => {
          li.scrollIntoView({ behavior:"smooth", block:"center" });
        }, 50);
      }
    });
}

/* === ЗАГРУЗКА ТРЕКА === */
function loadTrack(index, autoplay=false) {
  currentIndex = index;
  const title = tracks[index];
  audio.src = safeSrc(title);
  nowPlaying.textContent = "Сейчас играет: " + title.replace(".mp3","");
  if (autoplay) audio.play();
  renderTrackList(searchBox.value);
}

/* === СОБЫТИЯ === */
audio.onplay = () => {
  const stats = getStats();
  stats[tracks[currentIndex]].plays++;
  setStats(stats);
  renderTrackList(searchBox.value);
};

audio.addEventListener("ended", () => {
  if (repeatMode === 1) {
    audio.currentTime = 0;
    audio.play();
    return;
  }
  if (repeatMode === 2) {
    currentIndex = (currentIndex + 1) % tracks.length;
    loadTrack(currentIndex, true);
    return;
  }
  if (currentIndex < tracks.length - 1) {
    currentIndex++;
    loadTrack(currentIndex, true);
  }
});

downloadCurrentBtn.onclick = () => downloadFile(tracks[currentIndex]);

document.getElementById("prevBtn").onclick = () => {
  currentIndex = (currentIndex - 1 + tracks.length) % tracks.length;
  loadTrack(currentIndex, true);
};

document.getElementById("nextBtn").onclick = () => {
  currentIndex = isShuffle
    ? Math.floor(Math.random()*tracks.length)
    : (currentIndex + 1) % tracks.length;
  loadTrack(currentIndex, true);
};

document.getElementById("shuffleBtn").onclick = () => {
  isShuffle = !isShuffle;
  alert("Shuffle: " + (isShuffle ? "ON" : "OFF"));
};

document.getElementById("repeatBtn").onclick = () => {
  repeatMode = (repeatMode + 1) % 3;
  if (repeatMode === 0) alert("Повторение: выключено");
  if (repeatMode === 1) alert("Повторение: одна песня");
  if (repeatMode === 2) alert("Повторение: все песни");
};

searchBox.oninput = () => renderTrackList(searchBox.value);

/* === СТАРТ === */
initStats();
renderTrackList();
loadTrack(0, false);
</script>

</html>
